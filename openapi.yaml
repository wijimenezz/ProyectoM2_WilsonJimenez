openapi: "3.0.0"

info:
  title: API Blog
  version: "1.0.0"
  description: Documentación de la API de authors, posts y comments

servers:
  - url: http://localhost:3000
    description: Servidor local

tags:
  - name: Authors
    description: Endpoints para autores
  - name: Posts
    description: Endpoints para posts
  - name: Comments
    description: Endpoints para comentarios

paths:
  # ─────────────────────────────────────────
  # AUTHORS
  # ─────────────────────────────────────────

  /api/authors:
    get:
      tags:
        - Authors
      summary: Obtener todos los autores
      responses:
        "200":
          description: Lista de autores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Author"

    post:
      tags:
        - Authors
      summary: Crear un autor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorInput"
      responses:
        "201":
          description: Autor creado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Autor Creado con exito
                  newAuthor:
                    $ref: "#/components/schemas/Author"
        "400":
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/authors/{id}:
    get:
      tags:
        - Authors
      summary: Obtener un autor por id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID del autor
      responses:
        "200":
          description: Autor encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Author"
        "404":
          description: Autor no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      tags:
        - Authors
      summary: Actualizar un autor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorInput"
      responses:
        "200":
          description: Autor actualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Autor Actualizado con Exito
                  updated:
                    $ref: "#/components/schemas/Author"
        "404":
          description: Autor no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags:
        - Authors
      summary: Eliminar un autor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Autor eliminado
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: autor eliminado existosamente
        "404":
          description: Autor no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─────────────────────────────────────────
  # POSTS
  # ─────────────────────────────────────────

  /api/posts:
    get:
      tags:
        - Posts
      summary: Obtener todos los posts
      responses:
        "200":
          description: Lista de posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"

    post:
      tags:
        - Posts
      summary: Crear un post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Post creado
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Post Creado con exito
                  newPost:
                    $ref: "#/components/schemas/Post"
        "400":
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/posts/{id}:
    get:
      tags:
        - Posts
      summary: Obtener un post por id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      tags:
        - Posts
      summary: Actualizar un post
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostUpdateInput"
      responses:
        "200":
          description: Post actualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Post Actualizado con Exito
                  updated:
                    $ref: "#/components/schemas/Post"
        "404":
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags:
        - Posts
      summary: Eliminar un post
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post eliminado
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Post eliminado existosamente
        "404":
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/posts/authors/{id}:
    get:
      tags:
        - Posts
      summary: Obtener posts por autor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID del autor
      responses:
        "200":
          description: Posts del autor encontrados
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Los posts se encontraron exitosamente
                  posts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Post"
        "404":
          description: No se encontraron posts para ese autor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/posts/publish/{id}:
    patch:
      tags:
        - Posts
      summary: Publicar un post
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post publicado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Post Actualizado correctamente
                  post:
                    $ref: "#/components/schemas/Post"
        "404":
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─────────────────────────────────────────
  # COMMENTS
  # ─────────────────────────────────────────

  /api/comments:
    get:
      tags:
        - Comments
      summary: Obtener todos los comentarios
      responses:
        "200":
          description: Lista de comentarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"

    post:
      tags:
        - Comments
      summary: Crear un comentario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Comentario creado
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Comentario Creado con exito
                  newComment:
                    $ref: "#/components/schemas/Comment"
        "400":
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/comments/{id}:
    get:
      tags:
        - Comments
      summary: Obtener un comentario por id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comentario encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "404":
          description: Comentario no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      tags:
        - Comments
      summary: Actualizar un comentario
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
                  minLength: 5
                  example: Comentario actualizado
      responses:
        "200":
          description: Comentario actualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Comentario Actualizado con Exito
                  updated:
                    $ref: "#/components/schemas/Comment"
        "404":
          description: Comentario no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags:
        - Comments
      summary: Eliminar un comentario
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comentario eliminado
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Comentario eliminado existosamente
        "404":
          description: Comentario no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/comments/authors/{id}:
    get:
      tags:
        - Comments
      summary: Obtener comentarios por autor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID del autor
      responses:
        "200":
          description: Comentarios del autor encontrados
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Los comentarios se encontraron exitosamente
                  comments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Comment"
        "404":
          description: No se encontraron comentarios para ese autor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/comments/posts/{id}:
    get:
      tags:
        - Comments
      summary: Obtener comentarios por post
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID del post
      responses:
        "200":
          description: Comentarios del post encontrados
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Los comentarios del Post se encontraron exitosamente
                  comments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Comment"
        "404":
          description: No se encontraron comentarios para ese post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

# ─────────────────────────────────────────
# SCHEMAS
# ─────────────────────────────────────────

components:
  schemas:
    # AUTHORS
    Author:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Juan Pérez
        email:
          type: string
          example: juan@mail.com
        bio:
          type: string
          example: Escritor con experiencia en novelas

    AuthorInput:
      type: object
      required:
        - name
        - email
        - bio
      properties:
        name:
          type: string
          minLength: 3
          example: Juan Pérez
        email:
          type: string
          format: email
          example: juan@mail.com
        bio:
          type: string
          minLength: 10
          example: Escritor con experiencia en novelas

    # POSTS
    Post:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Mi primer post
        content:
          type: string
          example: Contenido del post
        author_id:
          type: integer
          example: 1
        published:
          type: boolean
          example: false
        name:
          type: string
          example: Juan Pérez

    PostInput:
      type: object
      required:
        - title
        - content
        - author_id
      properties:
        title:
          type: string
          minLength: 3
          example: Mi primer post
        content:
          type: string
          minLength: 10
          example: Contenido del post suficientemente largo
        author_id:
          type: integer
          example: 1
        published:
          type: boolean
          default: false
          example: false

    PostUpdateInput:
      type: object
      properties:
        title:
          type: string
          example: Titulo actualizado
        content:
          type: string
          example: Contenido actualizado

    # COMMENTS
    Comment:
      type: object
      properties:
        id:
          type: integer
          example: 1
        content:
          type: string
          example: Este es un comentario
        post_id:
          type: integer
          example: 1
        author_id:
          type: integer
          example: 2
        created_at:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
        name:
          type: string
          example: Juan Pérez
        title:
          type: string
          example: Mi primer post

    CommentInput:
      type: object
      required:
        - content
        - post_id
        - author_id
      properties:
        content:
          type: string
          minLength: 5
          example: Este es un comentario válido
        post_id:
          type: integer
          example: 1
        author_id:
          type: integer
          example: 2

    # GLOBAL
    Error:
      type: object
      properties:
        mensaje:
          type: string
          example: Recurso no encontrado
